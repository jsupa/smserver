name: Build SMServer release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-tweak:
    name: Build libsmserver tweak
    runs-on: ubuntu-latest

    env:
      THEOS: /home/runner/theos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get install -y build-essential fakeroot rsync curl perl zip git \
            libxml2 libtinfo6 libplist-utils

      - name: Cache Theos + toolchain + SDKs
        uses: actions/cache@v4
        id: theos-cache
        with:
          path: /home/runner/theos
          key: theos-home-v1

      - name: Install Theos
        if: steps.theos-cache.outputs.cache-hit != 'true'
        run: git clone --recursive https://github.com/theos/theos.git $THEOS

      - name: Run update-theos
        if: steps.theos-cache.outputs.cache-hit != 'true'
        run: $THEOS/bin/update-theos

      - name: Download Linux toolchain
        if: steps.theos-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p $THEOS/toolchain
          wget -q https://github.com/kabiroberai/swift-toolchain-linux/releases/download/v2.3.0/swift-5.8-ubuntu22.04.tar.xz \
            -O /tmp/toolchain.tar.xz
          tar -xf /tmp/toolchain.tar.xz -C $THEOS/toolchain

      - name: Download iOS 16.5 SDK
        if: steps.theos-cache.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/theos/sdks/archive/master.zip -O /tmp/sdks.zip
          unzip -q /tmp/sdks.zip -d /tmp/sdks
          mv /tmp/sdks/sdks-master/*.sdk $THEOS/sdks/

      - name: Install libMRYIPC
        run: |
          curl -fsSL https://raw.githubusercontent.com/Muirey03/MRYIPC/master/MRYIPCCenter.h \
            -o $THEOS/include/MRYIPCCenter.h
          mkdir -p $THEOS/lib/iphone/rootless $THEOS/lib/iphone/roothide
          curl -fsSL https://raw.githubusercontent.com/Muirey03/MRYIPC/master/usr/lib/libmryipc.dylib \
            -o $THEOS/lib/libmryipc.dylib
          cp $THEOS/lib/libmryipc.dylib $THEOS/lib/iphone/libmryipc.dylib
          cp $THEOS/lib/libmryipc.dylib $THEOS/lib/iphone/rootless/libmryipc.dylib
          cp $THEOS/lib/libmryipc.dylib $THEOS/lib/iphone/roothide/libmryipc.dylib

      - name: Build tweak
        run: |
          export THEOS=/home/runner/theos
          export THEOS_MAKE_PATH=/home/runner/theos/makefiles
          export PATH="/home/runner/theos/bin:$PATH"
          cd libsmserver
          make package \
            THEOS=/home/runner/theos \
            THEOS_MAKE_PATH=/home/runner/theos/makefiles \
            ARCHS="arm64 arm64e" \
            TARGET="iphone:clang:16.5" \
            THEOS_PACKAGE_SCHEME=roothide \
            FINALPACKAGE=1

      - name: Extract dylib from staging
        run: |
          # Get the compiled dylib directly from Theos staging dir
          DYLIB=$(find libsmserver -name "libsmserver.dylib" | grep -v "^libsmserver/lib/" | head -1)
          if [ -z "$DYLIB" ]; then
            DYLIB=$(find libsmserver/.theos -name "libsmserver.dylib" | head -1)
          fi
          if [ -z "$DYLIB" ]; then
            DYLIB=$(find libsmserver -name "libsmserver.dylib" | head -1)
          fi
          echo "Found dylib: $DYLIB"
          cp "$DYLIB" libsmserver_built.dylib

      - name: Upload tweak dylib
        uses: actions/upload-artifact@v4
        with:
          name: libsmserver-dylib
          path: libsmserver_built.dylib

  build-app:
    name: Build SMServer app deb
    runs-on: macos-14
    needs: build-tweak

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download tweak dylib
        uses: actions/download-artifact@v4
        with:
          name: libsmserver-dylib
          path: tweak-artifact

      - name: Select Xcode
        run: |
          if [ -d /Applications/Xcode_16.2.app ]; then
            sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          else
            XCODE=$(ls /Applications | grep -E '^Xcode.*\.app$' | sort -V | tail -1)
            sudo xcode-select -s "/Applications/${XCODE}/Contents/Developer"
          fi
          xcodebuild -version

      - name: Install dependencies
        run: |
          brew install ldid dpkg
          sudo gem install cocoapods --no-document
          echo "$(ruby -e 'puts Gem.bindir')" >> $GITHUB_PATH

      - name: Generate TLS certificate + IdentityPass.swift
        run: |
          cd src
          PASS=$(openssl rand -base64 24)
          openssl req -x509 -newkey rsa:4096 \
            -keyout key.pem -out cert.pem \
            -days 9999 -nodes \
            -subj "/C=ZZ/ST=./L=./O=./CN=smserver.com"
          openssl x509 -outform der -in cert.pem -out SMServer/cert.der
          openssl pkcs12 -export \
            -out SMServer/identity.pfx \
            -inkey key.pem -in cert.pem \
            -password pass:"${PASS}" \
            -legacy 2>/dev/null || \
          openssl pkcs12 -export \
            -out SMServer/identity.pfx \
            -inkey key.pem -in cert.pem \
            -password pass:"${PASS}"
          rm key.pem cert.pem
          printf 'class PKCS12Identity {\n\tstatic let pass: String = "%s"\n}' "${PASS}" \
            > SMServer/shared/IdentityPass.swift

      - name: Pod install
        run: |
          cd src
          pod install --repo-update

      - name: Build & archive (no code signing)
        run: |
          cd src
          xcodebuild clean archive \
            -workspace SMServer.xcworkspace \
            -scheme SMServer \
            -archivePath ../package/SMServer.xcarchive \
            -destination "generic/platform=iOS" \
            ARCHS="arm64" \
            EXCLUDED_ARCHS="arm64e" \
            ONLY_ACTIVE_ARCH=NO \
            IPHONEOS_DEPLOYMENT_TARGET=16.0 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES
          test -d ../package/SMServer.xcarchive || (echo "Archive not created!" && exit 1)

      - name: Sign with ldid
        run: |
          ldid -Ssrc/app.entitlements \
            package/SMServer.xcarchive/Products/Applications/SMServer.app/SMServer

      - name: Build combined rootless deb
        run: |
          APP=package/SMServer.xcarchive/Products/Applications/SMServer.app
          DEB=package/app_deb
          # Strip leading 'v' from tag (v0.9.1 -> 0.9.1), fallback to control file version
          VERSION="${GITHUB_REF_NAME#v}"
          [ -z "$VERSION" ] && VERSION=$(grep '^Version:' package/DEBIAN/control | awk '{print $2}')

          # Update version in control file to match tag
          sed -i '' "s/^Version:.*/Version: ${VERSION}/" package/DEBIAN/control

          # App into rootless Applications
          mkdir -p "${DEB}/var/jb/Applications"
          cp -r "$APP" "${DEB}/var/jb/Applications/SMServer.app"

          # Bundle libsmserver tweak into rootless substrate path
          mkdir -p "${DEB}/var/jb/Library/MobileSubstrate/DynamicLibraries"
          cp tweak-artifact/libsmserver_built.dylib \
            "${DEB}/var/jb/Library/MobileSubstrate/DynamicLibraries/libsmserver.dylib"
          cp libsmserver/libsmserver.plist \
            "${DEB}/var/jb/Library/MobileSubstrate/DynamicLibraries/libsmserver.plist"

          cp -r package/DEBIAN "${DEB}/DEBIAN"
          chmod 755 "${DEB}/DEBIAN/postinst" "${DEB}/DEBIAN/postrm"

          DEB_NAME="SMServer_${VERSION}_iphoneos-arm64.deb"
          dpkg-deb --build "${DEB}" "package/${DEB_NAME}"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "DEB_NAME=${DEB_NAME}" >> $GITHUB_ENV
          echo "Built: $(ls -lh package/${DEB_NAME})"

      - name: Upload combined deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DEB_NAME }}
          path: package/${{ env.DEB_NAME }}

  release:
    name: Create release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-app]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: SMServer_*_iphoneos-arm64.deb
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "SMServer ${{ github.ref_name }} – rootless iOS 16"
          body: |
            ## SMServer – rootless iOS 16 + RootHide

            Single package — includes both the app and the libsmserver tweak.

            ### Installation
            1. Install `SMServer` `.deb`
            2. Open the Messages app once (so the tweak injects into MobileSMS)
            3. Open SMServer and connect via browser
          files: artifacts/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
