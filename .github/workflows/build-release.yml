name: Build SMServer release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-app:
    name: Build SMServer app deb
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Install CocoaPods
        run: sudo gem install cocoapods --no-document

      - name: Generate TLS certificate + IdentityPass.swift
        run: |
          cd src
          PASS=$(openssl rand -base64 24)
          openssl req -x509 -newkey rsa:4096 \
            -keyout key.pem -out cert.pem \
            -days 9999 -nodes \
            -subj "/C=ZZ/ST=./L=./O=./CN=smserver.com"
          openssl x509 -outform der -in cert.pem -out SMServer/cert.der
          openssl pkcs12 -export \
            -out SMServer/identity.pfx \
            -inkey key.pem -in cert.pem \
            -password pass:"${PASS}" \
            -legacy 2>/dev/null || \
          openssl pkcs12 -export \
            -out SMServer/identity.pfx \
            -inkey key.pem -in cert.pem \
            -password pass:"${PASS}"
          rm key.pem cert.pem
          printf 'class PKCS12Identity {\n\tstatic let pass: String = "%s"\n}' "${PASS}" \
            > SMServer/shared/IdentityPass.swift

      - name: Pod install
        run: |
          cd src
          pod install --repo-update

      - name: Build & archive (no code signing)
        run: |
          cd src
          xcodebuild clean archive \
            -workspace SMServer.xcworkspace \
            -scheme SMServer \
            -archivePath ../package/SMServer.xcarchive \
            -destination "generic/platform=iOS" \
            ARCHS="arm64 arm64e" \
            ONLY_ACTIVE_ARCH=NO \
            IPHONEOS_DEPLOYMENT_TARGET=16.0 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            | xcpretty || true
          if [ ! -d ../package/SMServer.xcarchive ]; then
            xcodebuild clean archive \
              -workspace SMServer.xcworkspace \
              -scheme SMServer \
              -archivePath ../package/SMServer.xcarchive \
              -destination "generic/platform=iOS" \
              ARCHS="arm64 arm64e" \
              ONLY_ACTIVE_ARCH=NO \
              IPHONEOS_DEPLOYMENT_TARGET=16.0 \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              AD_HOC_CODE_SIGNING_ALLOWED=YES
          fi

      - name: Sign with ldid
        run: |
          brew install ldid
          APP=package/SMServer.xcarchive/Products/Applications/SMServer.app
          ldid -Ssrc/app.entitlements "$APP/SMServer"

      - name: Build rootless deb
        run: |
          APP=package/SMServer.xcarchive/Products/Applications/SMServer.app
          mkdir -p package/app_deb/var/jb/Applications
          cp -r "$APP" package/app_deb/var/jb/Applications/SMServer.app
          mkdir -p package/app_deb/DEBIAN
          cat > package/app_deb/DEBIAN/control << 'EOF'
          Package: com.ianwelker.smserver
          Depends: openssl, com.muirey03.libmryipc
          Conflicts: com.janshai.libsmserver, com.twickd.ian-welker.libsmserver
          Name: SMServer
          Version: 0.9.0
          Architecture: iphoneos-arm64
          Description: Send texts from your browser!
          Maintainer: June Welker <junewelker@gmail.com>
          Author: June Welker
          Section: Multimedia
          EOF
          cat > package/app_deb/DEBIAN/postinst << 'EOF'
          #!/bin/bash
          set -e
          dir="/var/jb/Applications/SMServer.app"
          [ -d $dir ] || mkdir -p $dir
          if ! [ -f "${dir}/smserver_cert_pass.txt" ]; then
            pass=$(openssl rand -base64 24)
            openssl req -x509 -newkey rsa:4096 -keyout "${dir}/key.pem" -out "${dir}/cert.pem" -days 9999 -nodes -subj "/C=ZZ/ST=./L=./O=./CN=smserver.com"
            openssl x509 -outform der -in "${dir}/cert.pem" -out "${dir}/cert.der"
            openssl pkcs12 -export -out "${dir}/identity.pfx" -inkey "${dir}/key.pem" -in "${dir}/cert.pem" -password pass:"${pass}" -legacy 2>/dev/null || openssl pkcs12 -export -out "${dir}/identity.pfx" -inkey "${dir}/key.pem" -in "${dir}/cert.pem" -password pass:"${pass}"
            rm "${dir}/key.pem" "${dir}/cert.pem"
            echo -n "${pass}" > "${dir}/smserver_cert_pass.txt"
          fi
          [ -d /var/jb/var/tmp/com.ianwelker.smserver ] || mkdir -p /var/jb/var/tmp/com.ianwelker.smserver
          EOF
          cat > package/app_deb/DEBIAN/postrm << 'EOF'
          #!/bin/bash
          rm -rf /var/jb/Applications/SMServer.app/
          EOF
          chmod 755 package/app_deb/DEBIAN/postinst
          chmod 755 package/app_deb/DEBIAN/postrm
          dpkg-deb --build package/app_deb package/SMServer_0.9.0_iphoneos-arm64.deb

      - name: Upload app deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: SMServer_0.9.0_iphoneos-arm64.deb
          path: package/SMServer_0.9.0_iphoneos-arm64.deb

  build-tweak:
    name: Build libsmserver tweak deb
    runs-on: ubuntu-latest

    env:
      THEOS: /home/runner/theos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get install -y build-essential fakeroot rsync curl perl zip git \
            libxml2 libtinfo6 libplist-utils

      - name: Cache Theos + toolchain + SDKs
        uses: actions/cache@v4
        id: theos-cache
        with:
          path: /home/runner/theos
          key: theos-home-v1

      - name: Install Theos
        if: steps.theos-cache.outputs.cache-hit != 'true'
        run: git clone --recursive https://github.com/theos/theos.git $THEOS

      - name: Run update-theos
        if: steps.theos-cache.outputs.cache-hit != 'true'
        run: $THEOS/bin/update-theos

      - name: Download Linux toolchain
        if: steps.theos-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p $THEOS/toolchain
          wget -q https://github.com/kabiroberai/swift-toolchain-linux/releases/download/v2.3.0/swift-5.8-ubuntu22.04.tar.xz \
            -O /tmp/toolchain.tar.xz
          tar -xf /tmp/toolchain.tar.xz -C $THEOS/toolchain

      - name: Download iOS 16.5 SDK
        if: steps.theos-cache.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/theos/sdks/archive/master.zip -O /tmp/sdks.zip
          unzip -q /tmp/sdks.zip -d /tmp/sdks
          mv /tmp/sdks/sdks-master/*.sdk $THEOS/sdks/

      - name: Install libMRYIPC
        run: |
          curl -fsSL https://raw.githubusercontent.com/Muirey03/MRYIPC/master/MRYIPCCenter.h \
            -o $THEOS/include/MRYIPCCenter.h
          mkdir -p $THEOS/lib/iphone/rootless
          curl -fsSL https://raw.githubusercontent.com/Muirey03/MRYIPC/master/usr/lib/libmryipc.dylib \
            -o $THEOS/lib/libmryipc.dylib
          cp $THEOS/lib/libmryipc.dylib $THEOS/lib/iphone/libmryipc.dylib
          cp $THEOS/lib/libmryipc.dylib $THEOS/lib/iphone/rootless/libmryipc.dylib

      - name: Build deb
        run: |
          export THEOS=/home/runner/theos
          export THEOS_MAKE_PATH=/home/runner/theos/makefiles
          export PATH="/home/runner/theos/bin:$PATH"
          cd libsmserver
          make package \
            THEOS=/home/runner/theos \
            THEOS_MAKE_PATH=/home/runner/theos/makefiles \
            ARCHS="arm64 arm64e" \
            TARGET="iphone:clang:16.5" \
            THEOS_PACKAGE_SCHEME=rootless \
            FINALPACKAGE=1

      - name: Find built deb
        id: find_deb
        run: |
          DEB=$(find libsmserver/packages -name "*.deb" | sort | tail -1)
          echo "deb_path=$DEB" >> $GITHUB_OUTPUT
          echo "deb_name=$(basename $DEB)" >> $GITHUB_OUTPUT

      - name: Upload tweak deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.find_deb.outputs.deb_name }}
          path: ${{ steps.find_deb.outputs.deb_path }}

  release:
    name: Create release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-app, build-tweak]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "SMServer ${{ github.ref_name }} – rootless iOS 16"
          body: |
            ## SMServer – rootless build pre iOS 16 + RootHide

            ### Inštalácia (poradie je dôležité!)
            1. Nainštaluj najprv `libsmserver` `.deb`
            2. Potom nainštaluj `SMServer` `.deb`
            3. Respring
          files: artifacts/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
