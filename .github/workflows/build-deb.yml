name: Build libsmserver rootless deb

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get install -y build-essential fakeroot rsync curl perl zip git \
            libxml2 libtinfo6 libplist-utils

      - name: Cache Theos
        uses: actions/cache@v4
        id: theos-cache
        with:
          path: /opt/theos
          key: theos-ubuntu-v4

      - name: Clone Theos
        if: steps.theos-cache.outputs.cache-hit != 'true'
        run: git clone --recursive https://github.com/theos/theos.git /opt/theos

      - name: Download Linux toolchain
        if: steps.theos-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p /opt/theos/toolchain
          wget -q https://github.com/kabiroberai/swift-toolchain-linux/releases/download/v2.3.0/swift-5.8-ubuntu22.04.tar.xz \
            -O /tmp/toolchain.tar.xz
          tar -xf /tmp/toolchain.tar.xz -C /opt/theos/toolchain

      - name: Download iOS 16.5 SDK
        if: steps.theos-cache.outputs.cache-hit != 'true'
        run: |
          cd /opt/theos/sdks
          wget -q https://github.com/theos/sdks/archive/master.zip -O master.zip
          unzip -q master.zip
          mv sdks-master/*.sdk /opt/theos/sdks/
          rm -rf sdks-master master.zip

      - name: Install libMRYIPC header
        run: |
          curl -fsSL https://raw.githubusercontent.com/Muirey03/MRYIPC/master/MRYIPCCenter.h \
            -o /opt/theos/include/MRYIPCCenter.h
          # Stub dylib pre linker
          echo "void _mryipc_stub(){}" > /tmp/stub.c
          /opt/theos/toolchain/linux/iphone/bin/clang \
            -arch arm64 -arch arm64e \
            -shared \
            -isysroot /opt/theos/sdks/iPhoneOS16.5.sdk \
            /tmp/stub.c \
            -o /opt/theos/lib/libmryipc.dylib 2>/dev/null \
          || touch /opt/theos/lib/libmryipc.dylib

      - name: Debug – verify Theos layout
        run: |
          echo "=== makefiles ==="
          ls /opt/theos/makefiles/
          echo "=== makefiles/master ==="
          ls /opt/theos/makefiles/master/
          echo "=== sdks ==="
          ls /opt/theos/sdks/
          echo "=== bin ==="
          ls /opt/theos/bin/ || echo "no bin dir"
          echo "=== make version ==="
          make --version | head -1

      - name: Build deb
        run: |
          export THEOS=/opt/theos
          export THEOS_MAKE_PATH=/opt/theos/makefiles
          export PATH="/opt/theos/bin:$PATH"
          cd libsmserver
          make package \
            ARCHS="arm64 arm64e" \
            TARGET="iphone:clang:16.5" \
            THEOS_PACKAGE_SCHEME=rootless \
            FINALPACKAGE=1

      - name: Find built deb
        id: find_deb
        run: |
          DEB=$(find libsmserver/packages -name "*.deb" | sort | tail -1)
          echo "deb_path=$DEB" >> $GITHUB_OUTPUT
          echo "deb_name=$(basename $DEB)" >> $GITHUB_OUTPUT
          echo "Found: $DEB"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.find_deb.outputs.deb_name }}
          path: ${{ steps.find_deb.outputs.deb_path }}

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "libsmserver ${{ github.ref_name }} – rootless iOS 16"
          body: |
            ## libsmserver – rootless build pre iOS 16 + RootHide

            ### Zmeny
            - `processCapabilities` hook pre iOS 16+ (hodnota `4485895`)
            - Rootless/RootHide (`iphoneos-arm64`)
            - arm64 + arm64e fat binary

            ### Inštalácia
            1. Stiahni `.deb`
            2. Presuň na telefón (AirDrop / iMazing / SCP)
            3. Otvor v **Sileo** → nainštaluj
            4. Respring
          files: ${{ steps.find_deb.outputs.deb_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
