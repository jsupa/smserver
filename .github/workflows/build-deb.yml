name: Build libsmserver rootless deb

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Theos
        uses: actions/cache@v4
        id: theos-cache
        with:
          path: ${{ github.workspace }}/theos
          key: theos-${{ runner.os }}-v2

      - name: Install Theos
        uses: Randomblock1/theos-action@v1

      - name: Install libMRYIPC header
        run: |
          curl -fsSL https://raw.githubusercontent.com/Muirey03/MRYIPC/master/MRYIPCCenter.h \
            -o $THEOS/include/MRYIPCCenter.h
          # Stub pre linker – len prázdna dylib, reálna je na telefóne
          touch /tmp/mryipc_stub.c
          $THEOS/toolchain/linux/iphone/bin/clang \
            -arch arm64 -arch arm64e \
            -shared -o $THEOS/lib/libmryipc.dylib /tmp/mryipc_stub.c \
            -isysroot $THEOS/sdks/iPhoneOS16.5.sdk \
            || true
          # Fallback: skopíruj existujúcu stub ak clang zlyhal
          if [ ! -s "$THEOS/lib/libmryipc.dylib" ]; then
            printf '\xcf\xfa\xed\xfe' > $THEOS/lib/libmryipc.dylib
          fi

      - name: Build deb
        run: |
          cd libsmserver
          make package \
            ARCHS="arm64 arm64e" \
            TARGET="iphone:clang:16.5" \
            THEOS_PACKAGE_SCHEME=rootless \
            FINALPACKAGE=1

      - name: Find built deb
        id: find_deb
        run: |
          DEB=$(find libsmserver/packages -name "*.deb" | sort | tail -1)
          echo "deb_path=$DEB" >> $GITHUB_OUTPUT
          echo "deb_name=$(basename $DEB)" >> $GITHUB_OUTPUT
          echo "Found: $DEB"

      - name: Upload artifact (pre workflow_dispatch)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.find_deb.outputs.deb_name }}
          path: ${{ steps.find_deb.outputs.deb_path }}

      - name: Create Release (len pre tagy)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "libsmserver ${{ github.ref_name }} – rootless iOS 16"
          body: |
            ## libsmserver – rootless build pre iOS 16 + RootHide

            ### Zmeny oproti originálu
            - Pridaný `processCapabilities` hook pre iOS 16+ (hodnota `4485895`)
            - Rootless/RootHide kompatibilita (`iphoneos-arm64`)
            - arm64 + arm64e fat binary

            ### Inštalácia
            1. Stiahni `.deb` nižšie
            2. Presuň na telefón (AirDrop / SCP / iMazing)
            3. Otvor v **Sileo** → nainštaluj
            4. Respring
          files: ${{ steps.find_deb.outputs.deb_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
