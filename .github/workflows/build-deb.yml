name: Build libsmserver rootless deb

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      THEOS: /home/runner/theos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get install -y build-essential fakeroot rsync curl perl zip git \
            libxml2 libtinfo6 libplist-utils

      - name: Cache Theos + toolchain + SDKs
        uses: actions/cache@v4
        id: theos-cache
        with:
          path: /home/runner/theos
          key: theos-home-v1

      - name: Install Theos
        if: steps.theos-cache.outputs.cache-hit != 'true'
        run: |
          git clone --recursive https://github.com/theos/theos.git $THEOS

      - name: Run update-theos (vendor/include + vendor/lib)
        if: steps.theos-cache.outputs.cache-hit != 'true'
        run: $THEOS/bin/update-theos

      - name: Download Linux toolchain
        if: steps.theos-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p $THEOS/toolchain
          wget -q https://github.com/kabiroberai/swift-toolchain-linux/releases/download/v2.3.0/swift-5.8-ubuntu22.04.tar.xz \
            -O /tmp/toolchain.tar.xz
          tar -xf /tmp/toolchain.tar.xz -C $THEOS/toolchain

      - name: Download iOS 16.5 SDK
        if: steps.theos-cache.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/theos/sdks/archive/master.zip -O /tmp/sdks.zip
          unzip -q /tmp/sdks.zip -d /tmp/sdks
          mv /tmp/sdks/sdks-master/*.sdk $THEOS/sdks/

      - name: Install libMRYIPC
        run: |
          curl -fsSL https://raw.githubusercontent.com/Muirey03/MRYIPC/master/MRYIPCCenter.h \
            -o $THEOS/include/MRYIPCCenter.h
          echo "void _stub(){}" > /tmp/stub.c
          $THEOS/toolchain/linux/iphone/bin/clang \
            -arch arm64 -arch arm64e \
            -shared \
            -isysroot $THEOS/sdks/iPhoneOS16.5.sdk \
            /tmp/stub.c \
            -o $THEOS/lib/libmryipc.dylib 2>/dev/null \
          || touch $THEOS/lib/libmryipc.dylib

      - name: Build deb
        run: |
          export PATH="$THEOS/bin:$PATH"
          cd libsmserver
          make package \
            ARCHS="arm64 arm64e" \
            TARGET="iphone:clang:16.5" \
            THEOS_PACKAGE_SCHEME=rootless \
            FINALPACKAGE=1

      - name: Find built deb
        id: find_deb
        run: |
          DEB=$(find libsmserver/packages -name "*.deb" | sort | tail -1)
          echo "deb_path=$DEB" >> $GITHUB_OUTPUT
          echo "deb_name=$(basename $DEB)" >> $GITHUB_OUTPUT
          echo "Found: $DEB"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.find_deb.outputs.deb_name }}
          path: ${{ steps.find_deb.outputs.deb_path }}

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "libsmserver ${{ github.ref_name }} – rootless iOS 16"
          body: |
            ## libsmserver – rootless build pre iOS 16 + RootHide

            ### Zmeny
            - `processCapabilities` hook pre iOS 16+ (hodnota `4485895`)
            - Rootless/RootHide (`iphoneos-arm64`)
            - arm64 + arm64e fat binary

            ### Inštalácia
            1. Stiahni `.deb`
            2. Presuň na telefón (AirDrop / iMazing / SCP)
            3. Otvor v **Sileo** → nainštaluj
            4. Respring
          files: ${{ steps.find_deb.outputs.deb_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
